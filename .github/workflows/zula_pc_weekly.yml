name: Zula PC Zendesk Report (Weekly)

on:
  schedule:
    - cron: "5 0 * * 1"   # Pazartesi 00:05 UTC = TR 03:05
  workflow_dispatch:

concurrency:
  group: zula-pc-zendesk-reports
  cancel-in-progress: false
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  run:
    runs-on: ubuntu-latest
    env:
      REPORT_TYPE: "WEEKLY"
      REPORT_TZ_OFFSET_HOURS: "3"
      ZULA_BRAND_ID: ${{ secrets.ZULA_BRAND_ID }}
      ZULA_SHEET_ID: ${{ secrets.ZULA_SHEET_ID }}
      GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
      ZENDESK_REQS_PER_MIN: "6"

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10.13"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests gspread google-auth
      - name: Run reporter (Zula PC Weekly)
        env:
          PYTHONUNBUFFERED: "1"
          ZENDESK_SUBDOMAIN: ${{ secrets.ZENDESK_ZULA_SUBDOMAIN }}
          ZENDESK_EMAIL_TOKEN: ${{ secrets.ZENDESK_ZULA_EMAIL_TOKEN }}
          ZENDESK_API_TOKEN: ${{ secrets.ZENDESK_ZULA_API_TOKEN }}
          ZULA_BRAND_ID: ${{ secrets.ZENDESK_ZULA_BRAND_PC_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_ZULA_PC }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
        run: python -u -m zendesk_reports.reporter_zula_pc
