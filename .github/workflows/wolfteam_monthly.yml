name: Wolfteam Zendesk Report (Monthly)

on:
  schedule:
    - cron: "10 0 1 * *"  # Ayın 1'i 00:10 UTC = TR 03:10
  workflow_dispatch:

concurrency:
  group: wolfteam-zendesk-reports
  cancel-in-progress: false
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  run:
    runs-on: ubuntu-latest
    env:
      REPORT_TYPE: "MONTHLY"
      REPORT_TZ_OFFSET_HOURS: "3"
      WOLFTEAM_BRAND_ID: "33471181389841"
      GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10.13"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests gspread google-auth

      - name: Run reporter (Wolfteam Monthly)
        env:
          PYTHONUNBUFFERED: "1"
          ZENDESK_SUBDOMAIN: ${{ secrets.ZENDESK_WOLF_SUBDOMAIN }}
          ZENDESK_EMAIL_TOKEN: ${{ secrets.ZENDESK_WOLF_EMAIL_TOKEN }}
          ZENDESK_API_TOKEN: ${{ secrets.ZENDESK_WOLF_API_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_WOLFTEAM }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
        run: python -u -m zendesk_reports.reporter_wolfteam
