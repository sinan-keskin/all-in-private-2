name: Zula Strike Zendesk Report (Weekly)

on:
  schedule:
    - cron: "5 5 * * 1"   # 05:05 UTC = 08:05 TR (Pazartesi)
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  run:
    runs-on: ubuntu-latest
    env:
      REPORT_TYPE: "WEEKLY"
      REPORT_TZ_OFFSET_HOURS: "3"
      ZULA_STRIKE_SHEET_ID: ${{ secrets.ZULA_STRIKE_SHEET_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10.13"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests gspread google-auth

      - name: Run reporter (Zula Strike Weekly)
        env:
          PYTHONUNBUFFERED: "1"
          ZENDESK_SUBDOMAIN: ${{ secrets.ZENDESK_ZULA_SUBDOMAIN }}
          ZENDESK_EMAIL_TOKEN: ${{ secrets.ZENDESK_ZULA_EMAIL_TOKEN }}
          ZENDESK_API_TOKEN: ${{ secrets.ZENDESK_ZULA_API_TOKEN }}
          ZULA_BRAND_ID: ${{ secrets.ZENDESK_ZULA_BRAND_STRIKE_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_ZULA_STRIKE }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
        run: python -u -m zendesk_reports.reporter_zula_strike
